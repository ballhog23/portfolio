version: 0.2

phases:
  pre_build:
    on-failure: ABORT
    commands:
      - echo "Running pre-build tasks..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ecrURI

  build:
    on-failure: ABORT
    commands:
      - docker build . -t $ecrURI:$CODEBUILD_RESOLVED_SOURCE_VERSION -t $ecrURI:latest
  
  post_build:
    on-failure: ABORT
    commands:
      - docker push --all-tags $ecrURI
    
artifacts:
  files:
    - scripts/deploy.sh